<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CyberArk Test Portal - User DB Verification</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background: #eef2f3; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00a1e0; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0081b5; }
        #status-msg { margin-top: 15px; padding: 10px; border-radius: 4px; text-align: center; font-size: 0.9em; }
        .error { background: #ffdce0; color: #af192b; border: 1px solid #af192b; }
        .success { background: #dcffd6; color: #1e7e34; border: 1px solid #1e7e34; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="color: #333;">Client Auth System</h2>
    <form id="loginForm" action="javascript:void(0);" onsubmit="verifyUser()">
        <label>SAP User</label>
        <input type="text" id="sap-user" placeholder="CyberArk User">
        
        <label>Password</label>
        <input type="password" id="sap-password" placeholder="••••••••">
        
        <button type="submit" id="LOGON_BUTTON">Sign In</button>
    </form>
    <div id="status-msg"></div>
</div>

<script>
    // This is your simulated Database
    const userDatabase = [
        { username: "EAlexGC", password: "Password123!" },
        { username: "Cybolt_Admin", password: "SecretPassword" },
        { username: "Test_User", password: "123" }
    ];

    function verifyUser() {
        const userIn = document.getElementById('sap-user').value;
        const passIn = document.getElementById('sap-password').value;
        const status = document.getElementById('status-msg');

        // Check the "Database"
        const found = userDatabase.find(u => u.username === userIn && u.password === passIn);

        if (found) {
            status.innerHTML = "<strong>Access Granted!</strong><br>Found in Database.";
            status.className = "success";
            console.log("Login Success for: " + userIn);
        } else {
            status.innerHTML = "<strong>401 Unauthorized</strong><br>Invalid credentials or SessionID missing.";
            status.className = "error";
            console.error("Login Failed for: " + userIn);
        }
    }
</script>

</body>
</html>
